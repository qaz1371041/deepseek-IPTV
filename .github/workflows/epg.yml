name: EPG Update

on:
  schedule:
    - cron: '55 0 */2 * *'   # 每2天凌晨00:55执行（UTC）
  workflow_dispatch:

permissions:
  actions: write
  contents: write

env:
  # 主 EPG 源（可修改）
  PRIMARY_URL: "http://exml.51zmt.top:11111/download2.php?f=e.xml"
  # 备用 EPG 源
  FALLBACK_URL: "http://epg.51zmt.top:8000/e.xml"
  OUTPUT_DIR: "output"
  OUTPUT_FILE: "output/epg.xml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0   # 获取完整历史，以便比较哈希

      - name: Set up Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      # ---- 智能下载：主源失败则自动切换备用源 ----
      - name: Download EPG File
        run: |
          set -e
          download_with_retry() {
            local url=$1
            local output=$2
            echo "Trying $url ..."
            curl -L --connect-timeout 10 --max-time 90 --retry 3 --retry-delay 5 --fail -o "$output" "$url"
          }

          if download_with_retry "$PRIMARY_URL" "$OUTPUT_FILE"; then
            echo "Downloaded from primary source."
          else
            echo "Primary source failed, trying fallback..."
            if download_with_retry "$FALLBACK_URL" "$OUTPUT_FILE"; then
              echo "Downloaded from fallback source."
            else
              echo "All sources failed." >&2
              exit 1
            fi
          fi

          # 验证文件非空
          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "Error: Downloaded file is empty." >&2
            exit 1
          fi
          echo "File size: $(stat -c%s $OUTPUT_FILE) bytes"
          head -n 2 "$OUTPUT_FILE" || true   # 打印前两行帮助调试

      # ---- 计算哈希 ----
      - name: Calculate SHA-256 hash
        id: current_hash
        run: |
          HASH=$(sha256sum ${{ env.OUTPUT_FILE }} | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_ENV"
          echo "Current hash: $HASH"

      # ---- 获取上次提交中的哈希 ----
      - name: Get previous SHA-256 hash
        id: previous_hash
        run: |
          if git show HEAD:${{ env.OUTPUT_FILE }} >/dev/null 2>&1; then
            PREV_HASH=$(git show HEAD:${{ env.OUTPUT_FILE }} | sha256sum | awk '{print $1}')
            echo "previous_hash=$PREV_HASH" >> "$GITHUB_ENV"
            echo "Previous hash: $PREV_HASH"
          else
            echo "previous_hash=none" >> "$GITHUB_ENV"
            echo "No previous file found."
          fi

      # ---- 提交并推送（如有变化） ----
      - name: Commit and push if changed
        run: |
          if [ "${{ env.hash }}" != "${{ env.previous_hash }}" ]; then
            echo "Changes detected, preparing commit..."
            git add ${{ env.OUTPUT_FILE }}
            git commit -m "Auto-update EPG data ($(date -u '+%Y-%m-%d %H:%M:%S UTC'))"
            # 拉取最新代码避免冲突
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin ${{ github.ref_name }}
            echo "Push successful."
          else
            echo "No changes, skip commit."
          fi

      # ---- 清理旧的工作流运行（保留最近5条） ----
      - name: Clean up old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          WORKFLOW_ID="${{ github.workflow_id }}"
          CURRENT_RUN_ID="${{ github.run_id }}"

          echo "Fetching completed runs for workflow ID: $WORKFLOW_ID"
          response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=100&status=completed")

          if echo "$response" | jq -e '.message' >/dev/null 2>&1; then
            echo "API error: $(echo "$response" | jq -r '.message')" >&2
            exit 1
          fi

          # 提取所有完成的运行ID，按创建时间倒序，跳过最新5条，且排除当前运行
          run_ids=$(echo "$response" | jq -r '.workflow_runs // [] | sort_by(.created_at) | reverse | .[5:][] | .id' | grep -v "^$CURRENT_RUN_ID$" || true)

          if [ -z "$run_ids" ]; then
            echo "No old runs to delete."
            exit 0
          fi

          echo "Runs to delete:"
          echo "$run_ids"

          for id in $run_ids; do
            echo "Deleting run $id ..."
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs/$id"
            echo "Deleted."
            sleep 1
          done

          echo "Cleanup finished. Kept the latest 5 runs (excluding current)."
