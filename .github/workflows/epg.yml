name: EPG Update

on:
  schedule:
    - cron: '55 0 */2 * *'   # 每2天凌晨00:55执行（UTC时间）
  workflow_dispatch:          # 允许手动触发

# 工作流所需的权限
permissions:
  actions: write    # 用于删除旧的工作流运行
  contents: write   # 用于提交代码

env:
  EPG_URL: "http://exml.51zmt.top:11111/download2.php?f=e.xml"   # EPG 下载地址，可修改
  OUTPUT_DIR: "output"
  OUTPUT_FILE: "output/epg.xml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 检出仓库代码
      - uses: actions/checkout@v3

      # 配置 Git 用户信息
      - name: Set up Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # 创建输出目录
      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      # 下载 EPG 文件（带重试和超时）
      - name: Download EPG File
        run: |
          set -e
          echo "Downloading EPG from ${{ env.EPG_URL }} ..."
          curl -L --connect-timeout 10 --max-time 60 --retry 3 --retry-delay 5 \
            --fail -o "${{ env.OUTPUT_FILE }}" "${{ env.EPG_URL }}"
          if [ ! -s "${{ env.OUTPUT_FILE }}" ]; then
            echo "Error: Downloaded file is empty."
            exit 1
          fi
          echo "EPG file downloaded successfully. File size: $(stat -c%s ${{ env.OUTPUT_FILE }}) bytes"

      # 计算当前文件的 SHA-256 哈希值
      - name: Calculate SHA-256 hash of output/epg.xml
        id: current_hash
        run: |
          echo "hash=$(sha256sum ${{ env.OUTPUT_FILE }} | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "Current hash: ${{ env.hash }}"

      # 获取上次提交中该文件的哈希值（如果存在）
      - name: Get previous SHA-256 hash from last commit
        id: previous_hash
        run: |
          if git show HEAD:${{ env.OUTPUT_FILE }} >/dev/null 2>&1; then
            prev_hash=$(git show HEAD:${{ env.OUTPUT_FILE }} | sha256sum | awk '{print $1}')
            echo "previous_hash=$prev_hash" >> "$GITHUB_ENV"
            echo "Previous hash: $prev_hash"
          else
            echo "previous_hash=none" >> "$GITHUB_ENV"
            echo "File does not exist in previous commit."
          fi

      # 比较哈希值，如有变化则提交推送
      - name: Compare hashes and update if different
        run: |
          if [ "${{ env.hash }}" != "${{ env.previous_hash }}" ]; then
            echo "Changes detected. Committing and pushing..."
            git add ${{ env.OUTPUT_FILE }}
            git commit -m "Auto-update epg files."
            # 获取默认分支名（可能是 main 或 master）
            DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
            git push origin HEAD:$DEFAULT_BRANCH
            echo "Changes pushed to $DEFAULT_BRANCH."
          else
            echo "No changes detected in ${{ env.OUTPUT_FILE }}, skipping commit."
          fi

      # ---------- 清理旧的工作流运行，只保留最新5条 ----------
      - name: Clean up old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          WORKFLOW_ID="${{ github.workflow_id }}"
          
          echo "Fetching completed workflow runs for workflow ID: $WORKFLOW_ID"
          response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=100&status=completed")
          
          # 检查 API 是否返回错误
          if echo "$response" | jq -e '.message' > /dev/null 2>&1; then
            echo "API error: $(echo "$response" | jq -r '.message')"
            exit 1
          fi
          
          # 提取运行ID列表（跳过最近5条）
          run_ids=$(echo "$response" | jq -r '.workflow_runs // [] | sort_by(.created_at) | reverse | .[5:][] | .id')
          
          if [ -z "$run_ids" ]; then
            echo "No old runs to delete."
            exit 0
          fi
          
          echo "Runs to delete:"
          echo "$run_ids"
          
          # 遍历并删除
          for id in $run_ids; do
            echo "Deleting run ID: $id"
            delete_response=$(curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs/$id")
            # 检查删除是否成功（成功时HTTP状态码为204，curl无输出）
            if [ $? -ne 0 ]; then
              echo "Failed to delete run $id"
              exit 1
            fi
            sleep 1  # 避免 API 限流
          done
          
          echo "Cleanup completed. Kept the latest 5 runs."
