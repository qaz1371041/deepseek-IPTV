name: EPG Update

on:
  schedule:
    - cron: '55 0 */2 * *'   # 每2天凌晨00:55执行（UTC时间）
  workflow_dispatch:          # 允许手动触发

# 工作流所需的权限（必须设置）
permissions:
  actions: write    # 用于删除旧的工作流运行
  contents: write   # 用于提交代码

# 可配置的环境变量
env:
  EPG_URL: "http://exml.51zmt.top:11111/download2.php?f=e.xml"   # EPG 下载地址
  OUTPUT_DIR: "output"
  OUTPUT_FILE: "output/epg.xml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 检出仓库代码
      - uses: actions/checkout@v3

      # 配置 Git 用户信息
      - name: Set up Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # 创建输出目录
      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      # 下载 EPG 文件（带重试、超时和详细日志）
      - name: Download EPG File
        run: |
          set -e
          echo "Downloading EPG from ${{ env.EPG_URL }} ..."
          # 使用 curl 下载，增加失败重试，连接超时10秒，总超时90秒
          curl -L --connect-timeout 10 --max-time 90 --retry 3 --retry-delay 5 \
            --fail -o "${{ env.OUTPUT_FILE }}" "${{ env.EPG_URL }}" || {
            echo "Download failed. Please check URL or network."
            exit 1
          }
          # 验证下载文件非空
          if [ ! -s "${{ env.OUTPUT_FILE }}" ]; then
            echo "Error: Downloaded file is empty."
            exit 1
          fi
          echo "Download successful. File size: $(stat -c%s ${{ env.OUTPUT_FILE }}) bytes"
          # 可选：显示前几行，确认格式
          head -n 3 "${{ env.OUTPUT_FILE }}" || true

      # 计算当前文件的 SHA-256 哈希值
      - name: Calculate SHA-256 hash
        id: current_hash
        run: |
          HASH=$(sha256sum ${{ env.OUTPUT_FILE }} | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_ENV"
          echo "Current hash: $HASH"

      # 获取上次提交中该文件的哈希值（如果存在）
      - name: Get previous SHA-256 hash
        id: previous_hash
        run: |
          # 检查文件是否存在于上次提交中
          if git rev-parse HEAD >/dev/null 2>&1 && git show HEAD:${{ env.OUTPUT_FILE }} >/dev/null 2>&1; then
            PREV_HASH=$(git show HEAD:${{ env.OUTPUT_FILE }} | sha256sum | awk '{print $1}')
            echo "previous_hash=$PREV_HASH" >> "$GITHUB_ENV"
            echo "Previous hash: $PREV_HASH"
          else
            echo "previous_hash=none" >> "$GITHUB_ENV"
            echo "File does not exist in previous commit. Will be treated as new."
          fi

      # 比较哈希值，如有变化则提交推送
      - name: Commit and push if changed
        run: |
          if [ "${{ env.hash }}" != "${{ env.previous_hash }}" ]; then
            echo "Changes detected. Committing and pushing..."
            git add ${{ env.OUTPUT_FILE }}
            git commit -m "Auto-update EPG data"
            # 自动获取当前分支名（main 或 master）
            BRANCH=${GITHUB_REF#refs/heads/}
            git push origin HEAD:$BRANCH
            echo "Push to $BRANCH completed."
          else
            echo "No changes detected, skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- 清理旧的工作流运行，只保留最新5条 ----------
      - name: Clean up old workflow runs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          WORKFLOW_ID="${{ github.workflow_id }}"
          
          echo "Fetching completed workflow runs for workflow ID: $WORKFLOW_ID"
          response=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=100&status=completed")
          
          # 检查 API 是否返回错误
          if echo "$response" | jq -e '.message' > /dev/null 2>&1; then
            echo "API error: $(echo "$response" | jq -r '.message')"
            exit 1
          fi
          
          # 提取运行ID列表（跳过最近5条）
          run_ids=$(echo "$response" | jq -r '.workflow_runs // [] | sort_by(.created_at) | reverse | .[5:][] | .id')
          
          if [ -z "$run_ids" ]; then
            echo "No old runs to delete."
            exit 0
          fi
          
          echo "Runs to delete:"
          echo "$run_ids"
          
          # 遍历并删除
          for id in $run_ids; do
            echo "Deleting run ID: $id"
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/runs/$id" || {
              echo "Failed to delete run $id"
              exit 1
            }
            sleep 1
          done
          
          echo "Cleanup completed. Kept the latest 5 runs."
