name: EPG Update

on:
  schedule:
    - cron: '55 0 */2 * *' # 每2天凌晨00点55分执行任务，上海时区的UTC时间
  workflow_dispatch:      # 允许手动触发工作流

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Git user
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"

    - name: Create output directory
      run: mkdir -p output

    - name: Download EPG File
      run: wget http://epg.51zmt.top:8000/e.xml -O output/epg.xml

    - name: Calculate SHA-256 hash of output/epg.xml
      id: calculate_hash
      run: |
        echo "hash=$(sha256sum output/epg.xml | awk '{print $1}')" >> "$GITHUB_ENV"

    - name: Get previous SHA-256 hash from last commit
      id: get_previous_hash
      run: |
        if [ -f output/epg.xml ]; then
          echo "previous_hash=$(git show HEAD:output/epg.xml | sha256sum | awk '{print $1}')" >> "$GITHUB_ENV"
        else
          echo "previous_hash=none" >> "$GITHUB_ENV"
        fi

    - name: Compare hashes and update if different
      run: |
        if [ "${{ env.hash }}" != "${{ env.previous_hash }}" ]; then
          git add output/epg.xml
          git commit -m "Auto-update epg files."
          git push origin main
        else
          echo "No changes detected in output/epg.xml, skipping commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ---------- 新增：清理旧的工作流运行记录，只保留最新的5条 ----------
    - name: Clean up old workflow runs
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 获取当前仓库和工作流ID
        REPO="${{ github.repository }}"
        WORKFLOW_ID="${{ github.workflow }}"
        
        # 获取所有已完成的工作流运行，按创建时间倒序，取前100条（可根据需要调整）
        runs=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=100&status=completed")
        
        # 提取运行ID列表（跳过最近5条）
        run_ids=$(echo "$runs" | jq -r '.workflow_runs | sort_by(.created_at) | reverse | .[5:][] | .id')
        
        if [ -z "$run_ids" ]; then
          echo "No old runs to delete."
          exit 0
        fi
        
        # 遍历并删除
        for id in $run_ids; do
          echo "Deleting run ID: $id"
          curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/runs/$id"
          # 可选：为避免 API 限流，加入短暂延迟
          sleep 1
        done
        
        echo "Cleanup completed. Kept the latest 5 runs."
