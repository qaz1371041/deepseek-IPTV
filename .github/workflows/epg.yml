name: EPG Update

on:
  schedule:
    - cron: '0 22 * * *'   # 每天北京时间 06:00
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5   # 升级到 v5，支持 Node.js 24

      - name: Set up Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create output directory
        run: mkdir -p output

      - name: Download EPG File
        run: wget http://epg.51zmt.top:8000/e.xml -O output/epg.xml

      - name: Calculate SHA-256 hash of output/epg.xml
        id: calculate_hash
        run: |
          echo "hash=$(sha256sum output/epg.xml | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Get previous SHA-256 hash from last commit
        id: get_previous_hash
        run: |
          if [ -f output/epg.xml ]; then
            echo "previous_hash=$(git show HEAD:output/epg.xml | sha256sum | awk '{print $1}')" >> "$GITHUB_ENV"
          else
            echo "previous_hash=none" >> "$GITHUB_ENV"
          fi

      - name: Compare hashes and update if different
        run: |
          if [ "${{ env.hash }}" != "${{ env.previous_hash }}" ]; then
            git add output/epg.xml
            git commit -m "Auto-update epg files."
            git push origin main
          else
            echo "No changes detected in output/epg.xml, skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old workflow runs (keep latest 5)
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v8   # 已支持 Node.js 24
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const currentRun = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: context.runId,
            });
            const workflowId = currentRun.data.workflow_id;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: workflowId,
                status: 'completed',
                per_page: 100
              }
            );

            runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const keep = 5;
            for (const run of runs.slice(keep)) {
              console.log(`Deleting run ${run.id} created at ${run.created_at}`);
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: run.id
              });
            }
