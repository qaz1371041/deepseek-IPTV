name: EPG Update
on:
  schedule:
    - cron: '55 0 */2 * *'   # 每2天凌晨00:55（UTC）执行
  workflow_dispatch:         # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Git user
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create output directory
        run: mkdir -p output

      - name: Download EPG file
        run: wget http://epg.51zmt.top:8000/e.xml -O /tmp/epg.xml

      - name: Generate timestamp
        id: timestamp
        run: echo "time=$(date -u +'%Y%m%d_%H%M%S')" >> "$GITHUB_ENV"

      - name: Check and rotate files
        run: |
          # 进入 output 目录
          cd output

          # 获取所有 epg_*.xml 文件，按文件名排序（时间戳格式 yyyymmdd_hhmmss）
          files=( $(ls -1 epg_*.xml 2>/dev/null | sort) )
          latest_file=""
          if [ ${#files[@]} -gt 0 ]; then
            latest_file="${files[-1]}"
          fi

          # 比较新下载的文件与最新保留的文件内容是否相同
          if [ -n "$latest_file" ] && cmp -s "/tmp/epg.xml" "$latest_file"; then
            echo "No changes detected, skipping commit."
            exit 0
          fi

          # 生成带时间戳的新文件名
          new_file="epg_${{ env.time }}.xml"
          cp "/tmp/epg.xml" "$new_file"

          # 保留最近5个文件（按文件名排序）
          all_files=( $(ls -1 epg_*.xml 2>/dev/null | sort) )
          if [ ${#all_files[@]} -gt 5 ]; then
            remove_count=$(( ${#all_files[@]} - 5 ))
            for ((i=0; i<remove_count; i++)); do
              rm -f "${all_files[i]}"
            done
          fi

          # 返回上层目录
          cd ..

          # 提交所有更改（新增和删除的文件）
          git add output/
          git commit -m "Auto-update EPG: add $new_file, keep latest 5"
          git push origin main
