name: Daily Update

on:
  schedule:
    # 每天北京时间 6:00 触发（UTC 22:00）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  run_script:
    runs-on: ubuntu-latest
    # 添加必要的权限：允许删除运行记录
    permissions:
      actions: write
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests aiohttp

    - name: Run Python script
      run: |
        python main.py

    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        if ! git diff --staged --quiet; then
          git commit -m "Auto-update live files"
          git pull --rebase
          git push
        fi

    # 清理旧运行记录，仅保留最近5条
    - name: Cleanup old workflow runs (keep only 5)
      if: always()  # 即使前置步骤失败也执行清理
      uses: actions/github-script@v6
      with:
        script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const current_run_id = context.runId;

          // 从 GITHUB_WORKFLOW_REF 解析当前工作流文件名
          const workflowRef = process.env.GITHUB_WORKFLOW_REF;
          let workflow_id;
          if (workflowRef) {
            const match = workflowRef.match(/\.github\/workflows\/(.+?)@/);
            if (match) {
              workflow_id = match[1];
            }
          }
          // 降级：如果解析失败，使用工作流名称（可能无效，但作为备选）
          if (!workflow_id) {
            workflow_id = context.workflow;
          }

          console.log(`Using workflow_id: ${workflow_id}`);

          // 分页获取所有运行记录
          let runs = [];
          let page = 1;
          const per_page = 100;
          let response;

          do {
            response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              per_page,
              page
            });
            runs = runs.concat(response.data.workflow_runs);
            page++;
          } while (response.data.workflow_runs.length === per_page);

          // 按创建时间降序排序（最新的在前）
          runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

          // 保留前5条，删除其余
          const runsToDelete = runs.slice(5);
          console.log(`Total runs: ${runs.length}, keeping 5, deleting ${runsToDelete.length} runs.`);

          for (const run of runsToDelete) {
            if (run.id === current_run_id) {
              console.log(`Skipping current run ${run.id}`);
              continue;
            }
            console.log(`Deleting run ${run.id} from ${run.created_at}`);
            await github.rest.actions.deleteWorkflowRun({
              owner,
              repo,
              run_id: run.id
            });
          }

    env:
      TZ: Asia/Shanghai  # 设置时区为上海
