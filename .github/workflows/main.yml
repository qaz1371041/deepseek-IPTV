name: 直播源自动检测与更新

on:
  schedule:
    # 每天北京时间早上 6:00 和下午 18:00 自动运行 (UTC 时间 22:00 和 10:00)
    - cron: '0 22,10 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 安装 FFmpeg (用于精准检测画质和可播放性)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        
    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装 Python 依赖
      run: |
        pip install -r requirements.txt
        
    - name: 运行直播源检测脚本
      run: |
        python check_tv.py
        
    - name: 提交并推送更新
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add live.txt live.m3u
        git commit -m "🚀 自动更新: 过滤720P+源并按速度排序" || echo "没有需要更新的内容"
        git push
